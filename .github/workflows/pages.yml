name: Deploy events feed to GitHub Pages

# Publishes events.json (and the schema it validates against) to GitHub Pages,
# so consumers can fetch them from a stable public URL even while this repo
# stays private. Runs on every push to the default branch; the feed is live
# on the Pages URL once the job finishes (~30-60s).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble public/
        run: |
          mkdir -p public
          cp events.json public/events.json
          cp events.schema.json public/events.schema.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
